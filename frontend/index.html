<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Medicamentos</title>
</head>
<body>

  <h1>💊 Sistema de Medicamentos</h1>

  <!-- LOGIN -->
  <button onclick="loginGoogle()">Login com Google</button>

<!--LOGOUT -->
  <button onclick="logout()">Logout</button>

  <hr>

  <!-- ESCOLHER TIPO -->
  <h3>Escolher tipo</h3>
  <select id="tipo">
    <option value="paciente">Paciente</option>
    <option value="familiar">Familiar</option>
  </select>
  <button onclick="enviarTipo()">Confirmar tipo</button>

  <hr>

  <!-- VINCULAR -->
  <h3>Vincular paciente</h3>
  <input id="pacienteId" placeholder="UID do paciente" />
  <button onclick="vincular()">Vincular</button>

  <script type="module">

  //
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
  import { 
    getAuth, 
    signInWithPopup, 
    GoogleAuthProvider,
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"

  const firebaseConfig = {
    apiKey: "AIzaSyCbZqAiPeIFl2XDDLyNqk21JCv9UN44Fqg",
    authDomain: "maiscuidado-8e767.firebaseapp.com",
    projectId: "maiscuidado-8e767"
  }

  const app = initializeApp(firebaseConfig)
  const auth = getAuth()

  let token = null

  // ================= LOGIN =================
  window.loginGoogle = async function () {
    const provider = new GoogleAuthProvider()

    // 🔥 força escolher conta SEMPRE
    provider.setCustomParameters({
      prompt: "select_account"
    })

    const result = await signInWithPopup(auth, provider)
    const user = result.user

    token = await user.getIdToken()

    localStorage.setItem("token", token)

    alert("Logado como: " + user.email)
  }

  // ================= LOGOUT =================
  window.logout = async function () {
    await signOut(auth) // 🔥 desloga do Firebase

    localStorage.removeItem("token") // 🔥 remove token do backend

    alert("Deslogado com sucesso!")

    console.log("Logout realizado")
  }

  // ================= ENVIAR TIPO =================
  window.enviarTipo = async function () {
    const tipo = document.getElementById("tipo").value

    token = localStorage.getItem("token")

    const res = await fetch("http://localhost:3000/auth/google", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token,
        tipo
      })
    })

    const data = await res.json()
    console.log(data)

    alert("Tipo definido!")
  }

  // ================= VINCULAR =================
  window.vincular = async function () {
    const pacienteId = document.getElementById("pacienteId").value

    token = localStorage.getItem("token")

    const res = await fetch("http://localhost:3000/auth/vincular", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ pacienteId })
    })

    const data = await res.json()
    console.log(data)

    alert("Vinculado!")
  }

</script>

</body>
</html>
