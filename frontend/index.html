<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Medicamentos</title>

  <style>
    .btn-socorro {
      background: #e53935;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-socorro:hover {
      background: #c62828;
    }
  </style>
</head>
<body>

  <h1>💊 Sistema de Medicamentos</h1>

  <!-- LOGIN -->
  <button onclick="loginGoogle()">Login com Google</button>

  <!-- LOGOUT -->
  <button onclick="logout()">Logout</button>

  <hr>

  <!-- ESCOLHER TIPO -->
  <h3>Escolher tipo</h3>
  <select id="tipo">
    <option value="paciente">Paciente</option>
    <option value="familiar">Familiar</option>
  </select>
  <button onclick="enviarTipo()">Confirmar tipo</button>

  <hr>

  <!-- VINCULAR -->
  <h3>Vincular paciente</h3>
  <input id="pacienteId" placeholder="UID do paciente" />
  <button onclick="vincular()">Vincular</button>

  <hr>

  <!-- SOCORRO -->
  <h3>Emergência</h3>
  <button class="btn-socorro" onclick="enviarSocorro()">
    🚨 SOS
  </button>

  <script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js"
  
  import { 
    getAuth, 
    signInWithPopup, 
    GoogleAuthProvider,
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"

  const firebaseConfig = {
    apiKey: "AIzaSyCbZqAiPeIFl2XDDLyNqk21JCv9UN44Fqg",
    authDomain: "maiscuidado-8e767.firebaseapp.com",
    projectId: "maiscuidado-8e767",
    messagingSenderId: "837424163135",
    appId: "1:837424163135:web:26a73889255c684aab4b8a"
  }

  const app = initializeApp(firebaseConfig)
  const auth = getAuth()
  const messaging = getMessaging(app)

  let token = null

  // ================= LOGIN =================
  window.loginGoogle = async function () {
    const provider = new GoogleAuthProvider()

    provider.setCustomParameters({
      prompt: "select_account"
    })

    const result = await signInWithPopup(auth, provider)
    const user = result.user

    token = await user.getIdToken()

    const fcmToken = await gerarFcmToken()

    localStorage.setItem("token", token)

    await fetch("http://localhost:3000/auth/google", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token,
        tipo: "paciente",
        fcmToken
      })
    })

    alert("Logado como: " + user.email)
  }

  // ================= LOGOUT =================
  window.logout = async function () {
    await signOut(auth)
    localStorage.removeItem("token")
    alert("Deslogado com sucesso!")
  }

  // ================= ENVIAR TIPO =================
  window.enviarTipo = async function () {
    const tipo = document.getElementById("tipo").value
    token = localStorage.getItem("token")

    const res = await fetch("http://localhost:3000/auth/google", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        token,
        tipo
      })
    })

    const data = await res.json()
    console.log(data)

    alert("Tipo definido!")
  }

  // ================= VINCULAR =================
  window.vincular = async function () {
    const pacienteId = document.getElementById("pacienteId").value
    token = localStorage.getItem("token")

    const res = await fetch("http://localhost:3000/auth/vincular", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ pacienteId })
    })

    const data = await res.json()
    console.log(data)

    alert("Vinculado!")
  }

  // ================= SOS =================
  window.enviarSocorro = async function () {
    token = localStorage.getItem("token")

    if (!token) {
      alert("Você precisa estar logado")
      return
    }

    try {
      const res = await fetch("http://localhost:3000/auth/sos", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        }
      })

      const data = await res.json()

      if (res.ok) {
        alert("🚨 Socorro enviado!")
      } else {
        alert("Erro: " + data.erro)
      }

    } catch (err) {
      console.error(err)
      alert("Erro ao enviar socorro")
    }
  }

  // ================= FCM =================
  async function gerarFcmToken() {
    try {
      const permission = await Notification.requestPermission()

      if (permission !== "granted") {
        console.log("Permissão negada")
        return null
      }
      
      await navigator.serviceWorker.register("/firebase-messaging-sw.js")

      const registration = await navigator.serviceWorker.ready

      const fcmToken = await getToken(messaging, {
        vapidKey: "BEsKDt1Yo1dDRsDbdvFH9jZrjDP-RgD_eC_sheGzQrQIhRldCSwLDUEPnMki4vpushxfhgYF0yQnFfCXVTfpq80",
        serviceWorkerRegistration: registration
      })

      console.log("FCM Token:", fcmToken)

      return fcmToken

    } catch (err) {
      console.error("Erro ao gerar FCM token:", err)
      return null
    }
  }

</script>

</body>
</html>
